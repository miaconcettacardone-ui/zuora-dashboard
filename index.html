<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex"/>
<meta name="googlebot" content="noindex, nofollow"/>
<title>ProdLabs · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;
  --bg2:#0F1524;
  --card:#151B2E;
  --border:#232B42;
  --border-hover:#2E3754;
  --accent:#6366F1;
  --accent2:#8B5CF6;
  --accent-glow:rgba(99,102,241,.4);
  --text:#F8FAFC;
  --text2:#94A3B8;
  --text3:#64748B;
  --error:#EF4444;
  --error-bg:rgba(239,68,68,.08);
  --f:"Inter",system-ui,-apple-system,sans-serif;
  --mono:"JetBrains Mono",monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f);font-size:14px;-webkit-font-smoothing:antialiased}
body{
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,.15), transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(139,92,246,.1), transparent 60%),
    linear-gradient(180deg,#0A0E1A 0%,#0F1524 100%);
  background-attachment:fixed;
  position:relative;overflow:hidden
}
.grid-bg{
  position:fixed;inset:0;pointer-events:none;opacity:.35;
  background-image:
    linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 80%)
}
.container{width:100%;max-width:420px;position:relative;z-index:1}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.logo{
  width:48px;height:48px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.15);
  margin-bottom:16px;position:relative
}
.logo::after{
  content:"";position:absolute;inset:-2px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:.3;filter:blur(12px);z-index:-1
}
.logo svg{width:22px;height:22px;color:#fff}
.brand{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.brand-sub{font-size:11.5px;color:var(--text3);margin-top:2px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px 30px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1px rgba(99,102,241,.05);
  position:relative
}
.card::before{
  content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:linear-gradient(135deg,rgba(99,102,241,.08),transparent 40%);
  opacity:.6
}
h1{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.3px;position:relative}
.sub{font-size:13.5px;color:var(--text2);margin-bottom:24px;position:relative}
.field{margin-bottom:16px;position:relative}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;letter-spacing:.1px}
.input-wrap{position:relative}
input[type="text"],input[type="password"]{
  width:100%;height:44px;padding:0 14px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);font-size:14px;font-family:var(--f);font-weight:500;
  outline:none;transition:all .15s
}
input[type="text"]:hover,input[type="password"]:hover{border-color:var(--border-hover)}
input[type="text"]:focus,input[type="password"]:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,.15)
}
input::placeholder{color:var(--text3)}
.pwd-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center
}
.pwd-toggle:hover{color:var(--text);background:rgba(255,255,255,.05)}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:-4px}
.check{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text2);cursor:pointer;user-select:none}
.check input{
  appearance:none;width:15px;height:15px;
  border:1.5px solid var(--border-hover);
  border-radius:4px;background:var(--bg2);cursor:pointer;position:relative;flex-shrink:0
}
.check input:checked{background:var(--accent);border-color:var(--accent)}
.check input:checked::after{
  content:"";position:absolute;left:4px;top:1px;
  width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg)
}
.forgot{font-size:12.5px;color:var(--accent);text-decoration:none;font-weight:500}
.forgot:hover{text-decoration:underline}
.btn{
  width:100%;height:46px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
  box-shadow:0 4px 14px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;overflow:hidden
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.15)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.7;cursor:wait}
.btn .spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
  display:none
}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.error{
  background:var(--error-bg);
  border:1px solid rgba(239,68,68,.2);
  color:#FCA5A5;
  padding:10px 13px;border-radius:8px;
  font-size:12.5px;margin-bottom:16px;
  display:none;align-items:center;gap:8px
}
.error.show{display:flex;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.divider{
  display:flex;align-items:center;gap:12px;margin:22px 0 18px;
  color:var(--text3);font-size:11px;font-weight:500
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.sso-btn{
  width:100%;height:42px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;
  font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;margin-bottom:8px
}
.sso-btn:hover{border-color:var(--border-hover);background:#1A2136}
.footer{text-align:center;margin-top:24px;font-size:12.5px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
.legal{text-align:center;margin-top:18px;font-size:10.5px;color:var(--text3);letter-spacing:.2px}
.version{position:fixed;bottom:16px;left:16px;font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.3px;z-index:2}
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    </div>
    <div class="brand">ProdLabs</div>
    <div class="brand-sub">Product Innovation Studio</div>
  </div>

  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Access your product workspace</p>

    <div class="error" id="error">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg">Invalid email or password</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="you@company.com" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="pwd-toggle" onclick="togglePwd()" tabindex="-1">
            <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="row">
        <label class="check">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot" onclick="event.preventDefault();alert('Contact your admin to reset your password.')">Forgot password?</a>
      </div>

      <button type="submit" class="btn" id="submit-btn">
        <span class="btn-text">Sign in</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="divider">OR</div>

    <button class="sso-btn" onclick="ssoNotice()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button class="sso-btn" onclick="ssoNotice()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#F35325" d="M1 1h10v10H1z"/><path fill="#81BC06" d="M13 1h10v10H13z"/><path fill="#05A6F0" d="M1 13h10v10H1z"/><path fill="#FFBA08" d="M13 13h10v10H13z"/></svg>
      Continue with Microsoft
    </button>
  </div>

  <div class="footer">
    Don't have an account? <a href="#" onclick="event.preventDefault();alert('ProdLabs is invite-only. Contact your admin for access.')">Request access</a>
  </div>

  <div class="legal">
    Protected workspace · By signing in you agree to our Terms &amp; Privacy
  </div>
</div>

<div class="version">v2.4.1 · build 2026.04.20</div>

<script>
// ══════════════════════════════════════════════════
// ⚠️ SECURITY NOTE: This is client-side auth — bypassable
// by viewing source. For real security, use Vercel Pro
// password protection or Cloudflare Access.
// ══════════════════════════════════════════════════

// 🔐 EDIT THESE CREDENTIALS
var VALID_CREDS = [
  { email: 'mia@prodlabs.com', password: 'CHANGE_ME_123' }
  // Add more users here if needed:
  // { email: 'demo@prodlabs.com', password: 'another_password' }
];

function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('email').value.trim().toLowerCase();
  var password = document.getElementById('password').value;
  var errorEl = document.getElementById('error');
  var errorMsg = document.getElementById('error-msg');
  var btn = document.getElementById('submit-btn');

  errorEl.classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;

  // Simulate network delay so it feels real
  setTimeout(function() {
    var match = VALID_CREDS.find(function(c) {
      return c.email.toLowerCase() === email && c.password === password;
    });

    if (match) {
      sessionStorage.setItem('prodlabs_auth', 'ok');
      sessionStorage.setItem('prodlabs_user', email);
      if (document.getElementById('remember').checked) {
        try { localStorage.setItem('prodlabs_remember_email', email); } catch(e){}
      }
      window.location.href = 'app.html';
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
      errorMsg.textContent = 'Invalid email or password. Please try again.';
      errorEl.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 600);
}

function togglePwd() {
  var p = document.getElementById('password');
  var icon = document.getElementById('eye-icon');
  if (p.type === 'password') {
    p.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    p.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function ssoNotice() {
  var err = document.getElementById('error');
  var msg = document.getElementById('error-msg');
  msg.textContent = 'SSO is not configured for this workspace. Please sign in with your password.';
  err.classList.add('show');
  setTimeout(function(){ err.classList.remove('show'); }, 4000);
}

// Prefill remembered email
try {
  var rem = localStorage.getItem('prodlabs_remember_email');
  if (rem) {
    document.getElementById('email').value = rem;
    document.getElementById('remember').checked = true;
    document.getElementById('password').focus();
  } else {
    document.getElementById('email').focus();
  }
} catch(e) {
  document.getElementById('email').focus();
}
</script>
</body>
</html>
